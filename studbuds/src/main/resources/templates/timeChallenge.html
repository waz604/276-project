<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" data-theme="silk" class="bg-gradient-to-tr from-slate-200 to-amber-50">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudBuds - Time Challenge</title>
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="favicon/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="MyWebSite" />
    <link rel="manifest" href="/site.webmanifest" />


    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Fira+Code&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/home.css" />
    <link rel="stylesheet" href="/flashcard.css" />
    <link rel="stylesheet" href="/XP_system/style.css" />

    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="/theme.js"></script>
  </head>

  <body class="page bg-gradient-to-tr from-slate-200 to-amber-50" 
      data-day-classes="bg-gradient-to-tr from-slate-200 to-amber-50"
      data-night-classes="bg-gradient-to-r from-slate-900 to-slate-700">
    <div class="navbar bg-base-100 shadow-sm sticky top-0 z-50">
        <div class="navbar-start">
            <div class="dropdown">
                <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h8m-8 6h16" />
                    </svg>
                </div>
                <ul tabindex="-1" class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow">
                    <li><a href="/home">Home</a></li>
                    <li><a href="/decks">My Flashcard Decks</a></li>
                    <li><a href="/tutorial">Tutorial</a></li>
                    <li><a href="/logout">Logout</a></li>
                </ul>
            </div>
            <a href="/home" class="btn btn-ghost text-xl logo-text">StudBuds</a>
        </div>
        <div class="navbar-center hidden lg:flex">
            <ul class="menu menu-horizontal px-1">
                <li><a href="/tutorial">Tutorial</a></li>
            </ul>
        </div>
        <div class="navbar-end">
            <a href="/decks" class="btn mr-2">Return to Decks</a>

          <label class="flex cursor-pointer gap-2 items-center" style="display:flex; align-items:center;">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></svg>
            <input type="checkbox" value="night" class="toggle theme-controller" />
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        </label>

            <a href="/logout" class="btn">Logout</a>
        </div>
    </div>

    <main class="content">
      <div
        id="startScreen"
        class="card bg-base-100 shadow-xl border border-base-200 mx-auto text-center"
        style="max-width: 560px; margin-top: 130px"
      >
        <div class="card-body text-center">
          <h2
            class="card-title justify-center text-3xl"
            th:text="'Time Challenge: ' + ${deck.name}"
          >
            Time Challenge
          </h2>

          <p class="text-base-content/70">
            Race the clock and answer every card before the timer runs out.
          </p>

          <div class="stats shadow mx-auto">
            <div class="stat place-items-center">
              <div class="stat-title">Total Cards</div>
              <div class="stat-value text-primary">
                <span th:text="${totalCards}">0</span>
              </div>
              <div class="stat-desc">10 seconds per card</div>
            </div>
          </div>

          <div class="alert alert-info mt-4">
            <span>Complete all cards to earn XP.</span>
          </div>

          <div class="card-actions justify-center mt-2">
            <button onclick="startChallenge()" class="btn btn-neutral btn-wide">
              Start Challenge
            </button>
          </div>
        </div>
      </div>

      <div id="challengeScreen" style="display: none">
        <h3>
          Time Remaining:
          <span class="countdown font-mono text-2xl">
            <span
              id="timerDisplay"
              style="--value: 0"
              aria-live="polite"
              aria-label="0"
              >0</span
            > </span
          >s
        </h3>

        <p id="progress" class="badge badge-outline badge-primary font-semibold">0 / <span th:text="${totalCards}">0</span></p>

        <progress
          id="progressBar"
          class="progress progress-primary w-full"
          value="0"
          th:max="${totalCards}"
        ></progress>

        <div id="flashcard" class="flip-card">
          <div class="flip-card-inner" id="inner-card">
            <div id="card-front" class="flip-card-front">
              <p id="questionText">Question</p>
            </div>
          </div>
        </div>

        <br /><br />
        <div class="flex flex-col items-center">
          <label class="input w-full">
            <div class="label">Answer</div>
            <input type="text" id="userAnswer" placeholder="Enter answer here" />
          </label>

          <button onclick="checkAnswer()" class="btn btn-success mt-2 min-w-60">
            Submit Answer
          </button>
          <button onclick="nextCard()" class="btn mt-2 min-w-60">Next Card</button>

          <div id="result" class="hidden w-full"></div>

          <button onclick="restartChallenge()" class="btn mt-2 min-w-60">Retry</button>
        </div>
      </div>
    </main>

    <script th:inline="javascript">
      let questions = /*[[${questions}]]*/ [];
      let answers = /*[[${answers}]]*/ [];
      let totalCards = /*[[${totalCards}]]*/ 0;

      let currentCard = 0;
      let score = 0;
      let answeredCorrectly = false;
      let challengeOver = false;

      let timeLimit = totalCards > 0 ? totalCards * 10 : 10;
      let timeRemaining = timeLimit;
      let timer;
      let xpAwarded = false;

      function updateTimerDisplay() {
        const timerDisplay = document.getElementById("timerDisplay");
        timerDisplay.innerText = timeRemaining;
        timerDisplay.style.setProperty("--value", timeRemaining);
        timerDisplay.setAttribute("aria-label", timeRemaining);
      }

      function updateProgressBar() {
        const bar = document.getElementById("progressBar");
        if (bar) {
          bar.max = totalCards > 0 ? totalCards : 1;
          bar.value = currentCard + 1;
        }
      }
      function awardTimeChallengeXp() {
        fetch("/xp/time-challenge", {
          method: "POST",
          headers: {
            "Content-Type": "application/x-www-form-urlencoded",
          },
          body:
            "totalCards=" +
            encodeURIComponent(totalCards) +
            "&score=" +
            encodeURIComponent(score) +
            "&timeRemaining=" +
            encodeURIComponent(timeRemaining),
        })
        .then(function(res) { return res.json(); })
        .then(function(data) {
          // Animate the XP bar without double-saving (server already saved it)
          if (data.xp > 0 && typeof display_XP === 'function') {
            display_XP(data.xp);
          }
        })
        .catch((err) => {
          console.error("failed to save time challenge xp", err);
        });
      }

      function showAlert(message, type) {
        const result = document.getElementById("result");
        result.className = "alert";
        result.style.marginTop = "10px";
        if (type === "success") {
          result.classList.add("alert-success");
        } else if (type === "error") {
          result.classList.add("alert-error");
        } else {
          result.classList.add("alert-info");
        }
        result.innerHTML = message.replace(/\n/g, "<br>");
        result.classList.remove("hidden");
      }

      function startChallenge() {
        document.getElementById("startScreen").style.display = "none";
        document.getElementById("challengeScreen").style.display = "block";

        updateTimerDisplay();

        showCard();

        timer = setInterval(function () {
          if (challengeOver) {
            clearInterval(timer);
            return;
          }

          timeRemaining--;
          updateTimerDisplay();

          if (timeRemaining <= 0) {
            clearInterval(timer);
            challengeOver = true;

            showAlert(
              "Time's up. Challenge failed.\n" +
                "Score: " +
                score +
                " / " +
                totalCards,
              "error",
            );
          }
        }, 1000);
      }

      function showCard() {
        if (totalCards === 0) {
          document.getElementById("questionText").innerText =
            "No flashcards loaded";
          challengeOver = true;
          return;
        }

        document.getElementById("questionText").innerText =
          questions[currentCard];
        document.getElementById("progress").innerText =
          currentCard + 1 + " / " + totalCards;

        updateProgressBar();

        document.getElementById("userAnswer").value = "";

        answeredCorrectly = false;
      }

      function checkAnswer() {
        if (challengeOver) return;

        let userAnswer = document
          .getElementById("userAnswer")
          .value.trim()
          .toLowerCase();
        let correctAnswer = answers[currentCard].trim().toLowerCase();

        if (userAnswer === "") {
          document.getElementById("result").innerText =
            "please type an answer first.";
        } else if (userAnswer === correctAnswer) {
          if (!answeredCorrectly) {
            score++;
            answeredCorrectly = true;
          }
          document.getElementById("result").innerText = "correct.";
          nextCard();
        } else {
          showAlert("Incorrect.", "error");
        }
      }

      function nextCard() {
        if (challengeOver) return;

        currentCard++;

        if (currentCard >= totalCards) {
          clearInterval(timer);
          challengeOver = true;

          document.getElementById("progress").innerText =
            totalCards + " / " + totalCards;

          const bar = document.getElementById("progressBar");
          if (bar) bar.value = totalCards;
          if (!xpAwarded) {
            awardTimeChallengeXp();
            xpAwarded = true;
          }
          showAlert(
            "Challenge complete!\n" +
              "Score: " +
              score +
              " / " +
              totalCards +
              "\nTime remaining: " +
              timeRemaining +
              "s",
            "success",
          );

          return;
        }

        showCard();
        document.getElementById("result").classList.add("hidden");
      }

      function restartChallenge() {
        location.reload();
      }
    </script>
    <script src="/XP_system/XP.js"></script>
  </body>
</html>
