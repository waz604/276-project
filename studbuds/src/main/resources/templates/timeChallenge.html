<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudBuds - Time Challenge</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Fira+Code&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/shared.css" />
    <link rel="stylesheet" href="/flashcard.css" />
    <link rel="stylesheet" href="/XP_system/style.css" />

    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>

  <body class="page">
    <nav class="navbar">
      <span class="logo-text">StudBuds</span>

      <div style="display: flex; gap: 8px">
        <a th:href="@{/decks/{id}/cards(id=${deck.id})}" class="btn-logout">
          Back to Deck
        </a>
        <a href="/decks" class="btn-logout">My Decks</a>
      </div>
    </nav>

    <main class="content">
      <div id="startScreen">
        <h2 th:text="'Time Challenge: ' + ${deck.name}">Time Challenge</h2>

        <p>Total Cards: <span th:text="${totalCards}">0</span></p>
        <p>Complete all cards before time runs out.</p>

        <button onclick="startChallenge()" class="btn-action">
          Start Challenge
        </button>
      </div>

      <div id="challengeScreen" style="display: none">
        <h3>
          Time Remaining:
          <span class="countdown font-mono text-2xl">
            <span
              id="timerDisplay"
              style="--value: 0"
              aria-live="polite"
              aria-label="0"
              >0</span
            > </span
          >s
        </h3>

        <p id="progress">0 / <span th:text="${totalCards}">0</span></p>

        <progress
          id="progressBar"
          class="progress progress-primary w-full"
          value="0"
          th:max="${totalCards}"
        ></progress>

        <div id="flashcard" class="flip-card">
          <div class="flip-card-inner" id="inner-card">
            <div id="card-front" class="flip-card-front">
              <p id="questionText">Question</p>
            </div>
          </div>
        </div>

        <br /><br />
        <input type="text" id="userAnswer" placeholder="type your answer" />

        <button onclick="checkAnswer()" class="btn-action">
          Submit Answer
        </button>
        <button onclick="nextCard()" class="btn-action">Next Card</button>

        <h3 id="result"></h3>

        <button onclick="restartChallenge()" class="btn-action">Retry</button>
      </div>
    </main>

    <script th:inline="javascript">
      let questions = /*[[${questions}]]*/ [];
      let answers = /*[[${answers}]]*/ [];
      let totalCards = /*[[${totalCards}]]*/ 0;

      let currentCard = 0;
      let score = 0;
      let answeredCorrectly = false;
      let challengeOver = false;

      let timeLimit = totalCards > 0 ? totalCards * 10 : 10;
      let timeRemaining = timeLimit;
      let timer;
      let xpAwarded = false;

      function updateTimerDisplay() {
        const timerDisplay = document.getElementById("timerDisplay");
        timerDisplay.innerText = timeRemaining;
        timerDisplay.style.setProperty("--value", timeRemaining);
        timerDisplay.setAttribute("aria-label", timeRemaining);
      }

      function updateProgressBar() {
        const bar = document.getElementById("progressBar");
        if (bar) {
          bar.max = totalCards > 0 ? totalCards : 1;
          bar.value = currentCard + 1;
        }
      }
      function awardTimeChallengeXp() {
        fetch("/xp/time-challenge", {
          method: "POST",
          headers: {
            "Content-Type": "application/x-www-form-urlencoded",
          },
          body:
            "totalCards=" +
            encodeURIComponent(totalCards) +
            "&score=" +
            encodeURIComponent(score) +
            "&timeRemaining=" +
            encodeURIComponent(timeRemaining),
        })
        .then(function(res) { return res.json(); })
        .then(function(data) {
          // Animate the XP bar without double-saving (server already saved it)
          if (data.xp > 0 && typeof display_XP === 'function') {
            display_XP(data.xp);
          }
        })
        .catch((err) => {
          console.error("failed to save time challenge xp", err);
        });
      }

      function startChallenge() {
        document.getElementById("startScreen").style.display = "none";
        document.getElementById("challengeScreen").style.display = "block";

        updateTimerDisplay();

        showCard();

        timer = setInterval(function () {
          if (challengeOver) {
            clearInterval(timer);
            return;
          }

          timeRemaining--;
          updateTimerDisplay();

          if (timeRemaining <= 0) {
            clearInterval(timer);
            challengeOver = true;

            document.getElementById("result").innerText =
              "time's up. challenge failed.\n" +
              "score: " +
              score +
              " / " +
              totalCards +
              "\n" +
              "cards completed: " +
              currentCard +
              " / " +
              totalCards;
          }
        }, 1000);
      }

      function showCard() {
        if (totalCards === 0) {
          document.getElementById("questionText").innerText =
            "No flashcards loaded";
          challengeOver = true;
          return;
        }

        document.getElementById("questionText").innerText =
          questions[currentCard];
        document.getElementById("progress").innerText =
          currentCard + 1 + " / " + totalCards;

        updateProgressBar();

        document.getElementById("userAnswer").value = "";

        answeredCorrectly = false;
      }

      function checkAnswer() {
        if (challengeOver) return;

        let userAnswer = document
          .getElementById("userAnswer")
          .value.trim()
          .toLowerCase();
        let correctAnswer = answers[currentCard].trim().toLowerCase();

        if (userAnswer === "") {
          document.getElementById("result").innerText =
            "please type an answer first.";
        } else if (userAnswer === correctAnswer) {
          if (!answeredCorrectly) {
            score++;
            answeredCorrectly = true;
          }
          document.getElementById("result").innerText = "correct.";
        } else {
          document.getElementById("result").innerText = "incorrect.";
        }
      }

      function nextCard() {
        if (challengeOver) return;

        currentCard++;

        if (currentCard >= totalCards) {
          clearInterval(timer);
          challengeOver = true;

          document.getElementById("progress").innerText =
            totalCards + " / " + totalCards;

          const bar = document.getElementById("progressBar");
          if (bar) bar.value = totalCards;
          if (!xpAwarded) {
            awardTimeChallengeXp();
            xpAwarded = true;
          }
          document.getElementById("result").innerText =
            "challenge complete.\n" +
            "score: " +
            score +
            " / " +
            totalCards +
            "\n" +
            "time remaining: " +
            timeRemaining +
            "s";

          return;
        }

        showCard();
        document.getElementById("result").innerText = "";
      }

      function restartChallenge() {
        location.reload();
      }
    </script>
    <script src="/XP_system/XP.js"></script>
  </body>
</html>
