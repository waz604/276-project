<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudBuds - Flashcards</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Fira+Code&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/shared.css">
    <link rel="stylesheet" href="/flashcard.css">
</head>
<body class="page">

<nav class="navbar">
    <span class="logo-text">StudBuds</span>

    <div style="display:flex; gap:8px;">
        <a href="/decks" class="btn-logout">Back to Decks</a>

        <a href="/logout" class="btn-logout">Logout</a>
    </div>
</nav>

<main class="content">

    <h2 th:text="${deck.name}">Deck Name</h2> <!--section name-->

    <a th:href="@{/decks/{id}/study(id=${deck.id})}" class="btn-action" style="width:auto; margin-bottom:24px; display:inline-block;">Study This Deck</a>

    <!--create -->
    <section class="fc-item">
        <h3>Add New Card</h3>
        <form th:action="@{/decks/{id}/cards(id=${deck.id})}" method="post">

            <label for="question">Question</label>
            <input type="text" id="question" name="question" placeholder="Enter question..." required />

            <label for="answer">Answer</label>
            <input type="text" id="answer" name="answer" placeholder="Enter answer..." required />

            <button type="submit" class="btn-action">Add Card</button>
        </form>
    </section>


    
    <section>
        <h3>Cards</h3>


        <div class="fc-item" th:each="card : ${deck.flashcards}">
            <p><strong>Q:</strong> <span th:text="${card.question}">Question</span></p>

            <p><strong>A:</strong> <span th:text="${card.answer}">Answer</span></p>

            <!-- edit-->

            <form th:action="@{/decks/{deckId}/cards/{cardId}/edit(deckId=${deck.id}, cardId=${card.id})}" method="post" class="edit-form"> 
 
                <input type="text" name="question" th:value="${card.question}" required />

                <input type="text" name="answer" th:value="${card.answer}" required /> 


                <button type="submit" class="btn-action btn-sm" style="width:auto;">Save</button>
            </form>


            <!--delete-->
            <form th:action="@{/decks/{deckId}/cards/{cardId}/delete(deckId=${deck.id}, cardId=${card.id})}" method="post">
                <button type="submit" class="btn-danger btn-sm">Delete</button>
            </form> 
        </div>

        <p th:if="${#lists.isEmpty(cards)}">No cards yet. Add one above!</p> 
    </section>
</main>

</body>
</html>
