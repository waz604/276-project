<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" data-theme="silk" class="bg-gradient-to-tr from-slate-200 to-amber-50" >
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudBuds - Study Mode</title>
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="favicon/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="MyWebSite" />
    <link rel="manifest" href="/site.webmanifest" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Fira+Code&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/flashcard.css">
    <link rel="stylesheet" href="/XP_system/style.css">
</head>
<body class="page bg-gradient-to-tr from-slate-200 to-amber-50"
      data-day-classes="bg-gradient-to-tr from-slate-200 to-amber-50"
      data-night-classes="bg-gradient-to-r from-slate-900 to-slate-700">

    <div class="navbar bg-base-100 shadow-sm sticky top-0 z-50">
        <div class="navbar-start">
            <div class="dropdown">
                <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h8m-8 6h16" />
                    </svg>
                </div>
                <ul tabindex="-1" class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow">
                    <li><a href="/home">Home</a></li>
                    <li><a href="/decks">My Flashcard Decks</a></li>
                    <li><a href="/tutorial">Tutorial</a></li>
                    <li><a href="/logout">Logout</a></li>
                </ul>
            </div>
            <a href="/home" class="btn btn-ghost text-xl logo-text">StudBuds</a>
        </div>
        <div class="navbar-center hidden lg:flex">
            <ul class="menu menu-horizontal px-1">
                <li><a href="/tutorial">Tutorial</a></li>
            </ul>
        </div>
        <div class="navbar-end">

            <label class="flex cursor-pointer gap-2 items-center" style="display:flex; align-items:center;">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></svg>
            <input type="checkbox" value="night" class="toggle theme-controller" />
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            </label>

            <a th:href="@{/decks/{id}/cards(id=${deck.id})}" class="btn mr-2">Return to Deck</a>
            <a href="/logout" class="btn">Logout</a>
        </div>
    </div>
    <main>
        <section class="content px-4 py-6">
            <div class="max-w-3xl mx-auto">
                <div class="mb-4 flex items-center justify-between">
                    <h2 class="text-2xl font-bold" th:text="${deck.name}">Deck Name</h2>
                    <span class="badge badge-ghost font-semibold" th:text="|Total: ${totalCards}|">Total: 0</span>
                </div>

                <div th:if="${totalCards == 0}" class="alert alert-warning">
                    <span>No flashcards yet. Add cards before studying.</span>
                </div>

                <div th:if="${totalCards > 0}" class="card bg-base-100 shadow-xl border">
                    <div class="card-body" id="study-container" th:attr="data-cards=${cards}">
                        <div class="flex items-center justify-between">
                            <h3 class="card-title">Study Mode</h3>
                            <span id="indexBadge" class="badge badge-outline badge-primary">1 / 1</span>
                        </div>

                        <label class="swap swap-flip w-full cursor-pointer">
                            <input id="flipToggle" type="checkbox" />

                            <div class="swap-off w-full">
                                <div class="rounded-xl bg-base-200 p-6 min-h-44 min-w-100 max-w-100 flex flex-col justify-center">
                                    <p class="text-sm opacity-70 mb-2 text-center">Prompt</p>
                                    <p id="questionText" class="text-lg font-medium break-words text-center">Question</p>
                                </div>
                            </div>
    
    <button class="btn-action" id="flip">Flip</button>

    <!-- previous next -->
    <div class="nav-row" style="margin-top:12px;">
        <a class="btn-action" id="previous">Previous</a>

        <a class="btn-action" id="next">Next</a>
    </div>

    <!-- Finish button: hidden until user reaches the last card -->
    <div style="margin-top:16px; text-align:center;">
        <button class="btn-action" id="finishBtn"
                th:attr="data-deck-id=${deck.id}, data-total-cards=${#lists.size(cards)}"
                style="display:none; background:#4caf50;">
            ✓ Finish &amp; Earn XP
        </button>
        <p id="xpMsg" style="display:none; margin-top:8px; font-weight:bold;"></p>
    </div>
</main>

<script src="/study.js"></script>
<script src="/XP_system/XP.js"></script>

</body>
</html>
