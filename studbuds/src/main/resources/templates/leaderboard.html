<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" data-theme="silk" class="bg-gradient-to-tr from-slate-200 to-amber-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudBuds - Leaderboard</title>
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="favicon/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="MyWebSite" />
    <link rel="manifest" href="/site.webmanifest" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Fira+Code&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/home.css">
    <link rel="stylesheet" href="/flashcard.css">
    <link rel="stylesheet" href="/leaderboard.css">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="/theme.js"></script>
</head>

<body class="page bg-gradient-to-tr from-slate-200 to-amber-50"
      data-day-classes="bg-gradient-to-tr from-slate-200 to-amber-50"
      data-night-classes="bg-gradient-to-r from-slate-900 to-slate-700">
    <div class="navbar bg-base-100 shadow-sm sticky top-0 z-50">
        <div class="navbar-start">
            <div class="dropdown">
                <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h8m-8 6h16" />
                    </svg>
                </div>
                <ul tabindex="-1" class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow">
                    <li><a href="/home">Home</a></li>
                    <li><a href="/decks">My Flashcard Decks</a></li>
                    <li><a href="/tutorial">Tutorial</a></li>
                    <li><a href="/logout">Logout</a></li>
                </ul>
            </div>
            <a href="/home" class="btn btn-ghost text-xl logo-text">StudBuds</a>
        </div>
        <div class="navbar-center hidden lg:flex">
            <ul class="menu menu-horizontal px-1">
                <li><a href="/decks">My Decks</a></li>
            </ul>
        </div>
        <div class="navbar-end">
            <a href="/profile" class="btn mr-2">Return to Profile</a>

            <label class="flex cursor-pointer gap-2 items-center" style="display:flex; align-items:center;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></svg>
                    <input type="checkbox" value="night" class="toggle theme-controller" />
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            </label>

            <a href="/logout" class="btn">Logout</a>
        </div>
    </div>


    
    <div class="page-content ">
        <div class="leaderboard bg-[#f4f1ee]"
             data-day-classes="bg-[#f4f1ee]"
             data-night-classes="bg-gradient-to-bl from-neutral-700 to-cyan-900">
        <h1>Top 10 Users</h1>
        <p class="subtitle">Users are ranked based on level.</p>

        <table class="user-table w-full">
            <thead>
                <tr>
                    <th class="px-4 py-3 text-left">Rank</th>
                    <th class="px-4 py-3 text-left">Username</th>
                    <th class="px-4 py-3 text-left">Level</th>
                    <th class="px-4 py-3 text-left">Total XP</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="user, rank : ${us}" 
                th:classappend=
                    "${rank.count == 1} ? 'rank-one' : 
                    (${rank.count == 2} ? 'rank-two' : 
                    (${rank.count == 3} ? 'rank-three' : ''))" >

                    <td th:text="'#' + ${rank.count}">1</td>
                    
                    <td>
                        <span th:if="${rank.first}">👑</span>
                        <span th:text="${user.name}"></span>
                    </td>

                    <td th:text="'Level ' + ${level.get(user.uid)}" class="px-4 py-2">Lvl 1</td>
                    <td th:text="${xp.get(user.uid)}" class="px-4 py-2">0 XP</td></div>

                </tr>
            </tbody>
        </table>

        <p th:if="${#lists.isEmpty(us)}" style="color:#888; margin-top:16px;">No users found.</p>
        </div>
    </div>
</body>
</html>
