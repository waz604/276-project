<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create New User</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Fira+Code&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shared.css">

</head>
<body>

    <div class="card">

        <div class="logo">
            <div class="logo-text">StudBuds</div>
        </div>

        <h1>Welcome New User</h1>
        <p class="subtitle">Organize your study life. Sign in to get started with Studbuds.</p>

        <div id="errorMsg"><span id="errorText"></span></div>

		<div class="row justify-content-center">
			<div class="col-md-4">

				<form action="/create" method="post" id="addForm" novalidate>
                <input type="hidden" id="google_id_input" name="google_id">

                <div class="field">
                    <label for="uname">Username</label>
                    <input type="text" id="uname" name="name" placeholder="Enter your username" autocomplete="username">
                </div>

                <div class="field">
                    <label for="psw">Password</label>
                    <input type="password" id="psw" name="password" placeholder="Enter your password" autocomplete="current-password">
                </div>

                <div id="g_id_onload"
                    data-client_id="336551242956-bfb2p5256d8gbpvbv8bbls11q6bgteq4.apps.googleusercontent.com"
                    data-callback="handleCredentialResponse">
                </div>

                <div class="g_id_signin" data-type="standard"></div>

                <button type="submit" class="btn-login">Create User</button>
                <a href="/login" class="btn btn-secondary">Already have an account?</a>

                </form>
			</div>
		</div>
	</div>
    <script src="/add.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script></body>
</html>
