<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudBuds - Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Fira+Code&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shared.css">
</head>
<body class="page">

    <nav class="navbar">
        <div class="logo-text">StudBuds</div>
        <a href="/logout" class="btn-logout">Logout</a>
    </nav>

    <div class="page-content">
        <h1>Hello, <span th:text="${user != null ? user.name : 'there'}">there</span></h1>
        <p class="subtitle">You're logged in to StudBuds.</p>
        <a th:href="@{/decks}">Go to My Decks</a>
    </div>

</body>
</html>
