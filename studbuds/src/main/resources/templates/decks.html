<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudBuds - My Decks</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Fira+Code&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/shared.css">
    <link rel="stylesheet" href="/flashcard.css">
</head>
<body class="page">

<nav class="navbar">
    <span class="logo-text">StudBuds</span>
    <div style="display: flex; gap: 8px;">
        <a href="/logout" class="btn-logout">Logout</a>
    </div>
</nav>

<div style="height: 16px;"></div>
<a href="/profile" class="returnbtn">Return to Profile</a>

<main class="content">
    <h2>My Decks </h2>

    <!--create -->
    <form th:action="@{/decks/add}" method="post" class="add-form">


        <input type="text" name="deckName" placeholder="New deck name" required />
        <button type="submit" class="btn-action" style="width:auto;">+ Add Deck</button>


    </form>

    <!--this is for the deck list-->
    <section class="deck-grid">
        <div class="deck-card" th:each="deck : ${decks}">

            <h5 th:text="${deck.name}">Deck Name</h5>

            <p class="card-count" th:text="${#lists.size(deck.flashcards)} + ' cards'">0 cards</p> <!-- if none. -->
            <div class="deck-actions">
                <a th:href="@{/decks/{id}/cards(id=${deck.id})}" class="btn-action btn-sm">View Cards</a>
                <a th:href="@{/decks/{id}/study(id=${deck.id})}" class="btn-action btn-sm">Study</a>
                
            </div>
            
            <div class="deck-actions">
                <a th:href="@{/decks/{id}/challenge(id=${deck.id})}" class="btn-action btn-sm">Challenge</a>
            </div>
            
            <form th:action="@{/decks/{id}/delete(id=${deck.id})}" method="get">

                <button type="submit" class="btn-danger btn-sm">Delete Deck</button>
            </form>

            <div class="content popup" id="pop-up">
                <p id="delete-warning">
                    <strong>Warning!</strong><br><br>
                    You are about to delete this deck: 
                    <strong><span th:text="${deleteDeck != null ? deleteDeck.name : 'Default Name'}">
                        deck name
                    </span></strong><br><br>

                    <strong>This action cannot be undone.</strong><br><br>
                    
                    <form class="delete-form" th:action="@{/decks/{id}/delete(id=${deleteDeck != null ? deleteDeck.id : 0})}" method="post">
                        <button type="submit" class="btn-danger">Delete</button>
                    </form>
                    
                </p>
                <button class="btn-popup" onclick="hidePopUp()"></button>
            </div>
        </div>

        <p th:if="${#lists.isEmpty(decks)}">No decks yet. Create one above!</p>
    </section>
</main>

<script th:inline="javascript" defer>

    function showPopUp() {
        const popup = document.getElementById('pop-up');
        if(popup) {
            popup.classList.add('popup-visible');
        }
    }

    function hidePopUp() {
        const popup = document.getElementById('pop-up');
        console.log(popup);
        if(popup) {
            if(popup.classList.contains('popup-visible')) {
                popup.classList.remove('popup-visible');
            }
        }
    }

    const showPopup = /*[[${showPopup}]]*/;

    if (showPopup) {
        showPopUp();
    }
</script>
</body>
</html>
