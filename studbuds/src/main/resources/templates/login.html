<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudBuds - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Fira+Code&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shared.css">
</head>
<body>
    <div class="card">

        <div class="logo">
            <div class="logo-text">StudBuds</div>
        </div>

        <h1>Welcome back</h1>
        <p class="subtitle">Log in to access your flashcard decks</p>

        <div id="errorMsg"><span id="errorText"></span></div>

        <div th:if="${loginError}" id="errorMsg" class="visible">
            <span id="errorText" th:text="${loginError}"></span>
        </div>

        <form action="/login" method="post" id="loginForm" novalidate>
        <input type="hidden" id="google_id_input" name="google_id">

            <div class="field">
                <label for="uname">Username</label>
                <input type="text" id="uname" name="uname" placeholder="Enter your username" autocomplete="username">
            </div>

            <div class="field">
                <label for="psw">Password</label>
                <input type="password" id="psw" name="psw" placeholder="Enter your password" autocomplete="current-password">
            </div>

            <button type="submit" class="btn-login" id="loginBtn">Login</button>
            
            <a href="/add" class="btn btn-secondary">Create New Account</a>
            

            <!-- Google Login -->
            <div id="g_id_onload"
                data-client_id="336551242956-bfb2p5256d8gbpvbv8bbls11q6bgteq4.apps.googleusercontent.com"
                data-callback="handleCredentialResponse">
            </div>

            <div class="g_id_signin" data-type="standard"></div>

        </form>
    </div>

    <script src="/login.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script></body>

</body>
</html>
